<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Luyện Toán Cùng Bé</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body id="app-body">
    <!-- Selection Screen -->
    <div id="selection-screen" class="selection-screen">
        <h1 class="selection-title">Hôm nay ai là người học nhỉ?</h1>
        <div class="selection-grid">
            <div class="selection-card girl-card" id="select-girl">
                <div class="card-image-container">
                    <img src="assets/cat.png" alt="" class="card-icon">
                </div>
                <h2>Đào Thảo Bảo Ngân</h2>
                <p>Lớp 4</p>
            </div>
            <div class="selection-card boy-card" id="select-boy">
                <div class="card-image-container">
                    <img src="assets/hero_iron.png" alt="" class="card-icon">
                </div>
                <h2>Đào Nguyễn Nhật</h2>
                <p>Lớp 1</p>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <div id="main-container" class="container hidden">
        <!-- Statistics Section -->
        <header class="stats-card">
            <button id="btn-back" class="btn-icon-back">← Đổi bạn học</button>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Bắt đầu lúc:</span>
                    <span id="start-time" class="stat-value">--:--</span>
                </div>
                <div class="stat-item">
                    <span id="label-minutes" class="stat-label">Tổng phút học:</span>
                    <span id="total-minutes" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tổng số câu:</span>
                    <span id="total-questions" class="stat-value">0</span>
                </div>
                <div class="stat-item highlight-success">
                    <span class="stat-label">Câu đúng:</span>
                    <span id="correct-count" class="stat-value">0</span>
                </div>
                <div class="stat-item highlight-error">
                    <span class="stat-label">Câu sai:</span>
                    <span id="wrong-count" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tỷ lệ đúng:</span>
                    <span id="accuracy-rate" class="stat-value">0%</span>
                </div>
            </div>
        </header>

        <!-- Main Question Section -->
        <main class="question-container">
            <div id="praise-message" class="praise-banner"></div>
            
            <div id="question-box" class="question-box">
                <div class="question-text" id="math-question">
                    Đang tải câu hỏi...
                </div>
                
                <div id="answer-inputs" class="answer-inputs">
                    <!-- Dynamic inputs based on type -->
                </div>

                <div class="action-buttons">
                    <button id="btn-check" class="btn btn-primary">Kiểm tra kết quả</button>
                    <button id="btn-next" class="btn btn-secondary hidden">Câu tiếp theo</button>
                </div>

                <div id="result-feedback" class="result-feedback hidden">
                    <p id="feedback-text"></p>
                    <p id="correct-answer-display"></p>
                </div>
            </div>

            <!-- Mascot Companion (Persistent & Animated) -->
            <div id="mascot-companion" class="mascot-companion">
                <img id="mascot-icon" src="" alt="">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
