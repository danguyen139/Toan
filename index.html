<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Luyện Toán Cùng Bé</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body id="app-body">
    <!-- Selection Screen -->
    <div id="selection-screen" class="selection-screen">
        <h1 class="selection-title">Hôm nay ai là người học nhỉ?</h1>
        <div class="selection-grid">
            <div class="selection-card girl-card" id="select-girl">
                <div class="card-image-container">
                    <img src="assets/cat.png" alt="" class="card-icon">
                </div>
                <h2>Đào Thảo Bảo Ngân</h2>
                <p>Lớp 4</p>
            </div>
            <div class="selection-card boy-card" id="select-boy">
                <div class="card-image-container">
                    <img src="assets/hero_iron.png" alt="" class="card-icon">
                </div>
                <h2>Đào Nguyễn Nhật</h2>
                <p>Lớp 1</p>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <div id="main-container" class="container hidden">
        <!-- Statistics Header -->
        <header class="stats-card">
            <button id="btn-back" class="btn-icon-back">← Đổi bạn học</button>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Bắt đầu lúc:</span>
                    <span id="start-time" class="stat-value">--:--</span>
                </div>
                <div class="stat-item">
                    <span id="label-minutes" class="stat-label">Thời gian học:</span>
                    <span id="total-minutes" class="stat-value">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tổng số câu:</span>
                    <span id="total-questions" class="stat-value">0</span>
                </div>
                <div class="stat-item highlight-success">
                    <span class="stat-label">Câu đúng:</span>
                    <span id="correct-count" class="stat-value">0</span>
                </div>
                <div class="stat-item highlight-error">
                    <span class="stat-label">Câu sai:</span>
                    <span id="wrong-count" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tỷ lệ đúng:</span>
                    <span id="accuracy-rate" class="stat-value">0%</span>
                </div>
            </div>
        </header>

        <!-- Streak Bar -->
        <div id="streak-bar" class="streak-bar hidden">
            <div class="streak-info">
                <span class="streak-item">🔥 <strong id="streak-count">0</strong> ngày</span>
                <span class="streak-item">⭐ <strong id="stars-count">0</strong> sao</span>
                <span class="streak-item">🎯 <strong id="daily-correct-count">0</strong>/30</span>
            </div>
            <div class="streak-progress-wrap">
                <div id="streak-progress-fill" class="streak-progress-fill"></div>
            </div>
            <button id="btn-redeem" class="btn-redeem">🎁 Đổi quà</button>
        </div>

        <!-- Main Question Section -->
        <main class="question-container">
            <div id="praise-message" class="praise-banner"></div>

            <div id="question-box" class="question-box">
                <div class="question-text" id="math-question">
                    Đang tải câu hỏi...
                </div>

                <div id="answer-inputs" class="answer-inputs">
                    <!-- Dynamic inputs rendered by game-engine.js -->
                </div>

                <div class="action-buttons">
                    <button id="btn-check" class="btn btn-primary">Kiểm tra kết quả</button>
                    <button id="btn-next" class="btn btn-secondary hidden">Câu tiếp theo</button>
                </div>

                <div id="result-feedback" class="result-feedback hidden">
                    <p id="feedback-text"></p>
                    <p id="correct-answer-display"></p>
                </div>
            </div>

            <!-- Mascot Companion -->
            <div id="mascot-companion" class="mascot-companion">
                <img id="mascot-icon" src="" alt="">
            </div>
        </main>
    </div>

    <!-- Redeem Modal -->
    <div id="redeem-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2>🎁 Đổi Quà</h2>
            <p>🔥 Streak: <strong id="redeem-streak-val">0</strong> ngày liên tục</p>
            <p>⭐ Sao tích luỹ: <strong id="redeem-stars-val">0</strong> sao</p>
            <div class="redeem-input-row">
                <label>Đổi bao nhiêu sao?</label>
                <input type="number" id="redeem-amount" min="1" placeholder="0">
            </div>
            <p class="redeem-remaining">Còn lại: <span id="redeem-remaining-val">0</span> sao</p>
            <div class="modal-actions">
                <button id="btn-redeem-confirm" class="btn btn-primary">Xác nhận</button>
                <button id="btn-redeem-close" class="btn btn-secondary">Đóng</button>
            </div>
        </div>
    </div>

    <!-- Milestone Overlay (CSS-only animation, no Lottie) -->
    <div id="milestone-overlay" class="milestone-overlay hidden">
        <div class="milestone-content">
            <div class="milestone-emoji" id="milestone-emoji">🔥</div>
            <p class="milestone-message" id="milestone-message"></p>
        </div>
    </div>

    <!-- Floating Background Stickers -->
    <div class="sticker-field" id="sticker-field" aria-hidden="true">
        <img src="assets/cat.png"         class="sticker s1" alt="">
        <img src="assets/hello_kitty.png" class="sticker s2" alt="">
        <img src="assets/pikachu.png"     class="sticker s3" alt="">
        <img src="assets/hero_spider.png" class="sticker s4" alt="">
        <img src="assets/doraemon.png"    class="sticker s5" alt="">
        <img src="assets/minion.png"      class="sticker s6" alt="">
    </div>

    <script src="js/state.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/streak-stars.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
